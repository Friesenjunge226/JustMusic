<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programm | Just Music</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #ff4757; 
            --bg-color: #121212; 
            --text-color: #f1f2f6;
            --card-bg: rgba(30, 30, 30, 0.85);
        }

        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            background: linear-gradient(rgba(18, 18, 18, 0.8), rgba(18, 18, 18, 0.9)), url('background.jpg') center/cover fixed;
        }

        header {
            background-color: rgba(0, 0, 0, 0.9);
            padding: 15px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--primary-color);
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 1px;
            color: var(--text-color);
        }
        
        header h1 span {
            color: var(--primary-color);
        }

        .back-link {
            display: block;
            margin-top: 5px;
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: white;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }

        h2 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .intro-text {
            margin-bottom: 30px;
            font-weight: 300;
        }

        #program-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .program-card {
            background-color: var(--card-bg);
            border-left: 4px solid var(--primary-color);
            padding: 15px 20px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-align: left;
            transition: transform 0.2s;
        }

        .program-card:hover {
            transform: translateX(5px);
        }

        .time {
            font-weight: 700;
            color: var(--primary-color);
            font-size: 1.1rem;
            min-width: 70px;
        }

        .act-details {
            flex-grow: 1;
            padding-left: 15px;
        }

        .act-name {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .act-genre-interpret {
            margin: 0;
            font-size: 0.9rem;
            color: #aaa;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #000;
            font-size: 0.9rem;
            color: #747d8c;
            margin-top: 40px;
        }

        @media (max-width: 600px) {
            .program-card {
                flex-direction: column;
                align-items: flex-start;
            }
            .time {
                margin-bottom: 5px;
            }
            .act-details {
                padding-left: 0;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>JUST <span>MUSIC</span></h1>
        <a href="index.html" class="back-link">← Zurück zur Startseite</a>
    </header>
